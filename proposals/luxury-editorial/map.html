<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Movement 2026 — Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0A0A;
    --off-white: #F5F0E8;
    --accent: #8B6914;
    --mid: #1A1A1A;
    --dim: #2A2A2A;
    --muted: #666;
    --rule: rgba(245,240,232,0.08);
  }

  html, body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Header */
  header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    animation: fadeIn 0.6s ease both;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--off-white);
    opacity: 0.5;
  }

  .screen-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.08em;
    line-height: 1;
    font-style: italic;
  }

  .date-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
  }

  /* Map container */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .map-svg-container {
    width: 100%;
    height: 100%;
    position: relative;
  }

  svg.map {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Venue pin tooltip */
  .pin-label {
    position: absolute;
    background: var(--black);
    border: 1px solid rgba(245,240,232,0.15);
    padding: 8px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  .pin-label.visible {
    opacity: 1;
  }

  .pin-label-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--off-white);
    display: block;
  }

  .pin-label-meta {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }

  /* Route planner panel */
  .route-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--rule);
    background: var(--black);
    padding: 0;
    animation: slideUp 0.6s ease 0.2s both;
  }

  .route-panel-header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--rule);
  }

  .route-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .route-clear {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .route-clear.visible { opacity: 1; }

  .route-venues {
    display: grid;
    grid-template-columns: 1fr 24px 1fr;
    align-items: center;
    padding: 14px 20px;
    gap: 0;
    border-bottom: 1px solid var(--rule);
  }

  .route-venue-slot {
    display: flex;
    flex-direction: column;
    gap: 3px;
    cursor: pointer;
  }

  .route-venue-slot-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .route-venue-slot-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--off-white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 20px;
    border-bottom: 1px solid var(--rule);
  }

  .route-venue-slot-name.empty {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  .route-arrow {
    text-align: center;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0;
  }

  .route-stats {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    padding: 12px 20px;
  }

  .route-stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 0 10px;
    align-items: center;
  }

  .route-stat:first-child { padding-left: 0; align-items: flex-start; }
  .route-stat:last-child { padding-right: 0; align-items: flex-end; }

  .route-stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--off-white);
    line-height: 1;
  }

  .route-stat-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 1px;
  }

  .route-divider {
    background: var(--rule);
    width: 1px;
    height: 30px;
    align-self: center;
  }

  /* Bottom nav */
  nav {
    display: flex;
    border-top: 1px solid var(--rule);
    flex-shrink: 0;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0 16px;
    gap: 4px;
    cursor: pointer;
    border: none;
    background: none;
    transition: opacity 0.2s;
  }

  .nav-item:hover { opacity: 0.7; }

  .nav-icon {
    width: 18px;
    height: 18px;
    opacity: 0.4;
  }

  .nav-item.active .nav-icon { opacity: 1; }

  .nav-item-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .nav-item.active .nav-item-label {
    color: var(--off-white);
  }

  /* FAB */
  .fab {
    position: absolute;
    bottom: 24px;
    right: 20px;
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
    z-index: 20;
  }

  .fab:hover { transform: translateY(-2px); }

  .fab svg { width: 16px; height: 16px; }

  /* Venue list drawer */
  .venue-list {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--black);
    transform: translateY(100%);
    transition: transform 0.4s ease;
    z-index: 30;
    overflow-y: auto;
    padding: 20px;
  }

  .venue-list.open { transform: translateY(0); }

  .venue-list-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .venue-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .venue-row:hover { opacity: 0.7; }

  .venue-row-left { display: flex; flex-direction: column; gap: 3px; }

  .venue-row-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .venue-row-addr {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .venue-row-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* Category dot */
  .cat-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-right: 8px;
    flex-shrink: 0;
    display: inline-block;
  }

  /* Legend */
  .legend {
    position: absolute;
    top: 12px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
    background: rgba(10,10,10,0.85);
    padding: 10px 12px;
    border: 1px solid var(--rule);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Venue selecting state */
  .selecting-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    letter-spacing: 0.08em;
    color: rgba(245,240,232,0.3);
    pointer-events: none;
    text-align: center;
    z-index: 4;
    display: none;
  }

  .selecting-hint.show { display: block; }
</style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">Movement Detroit</div>
    <div class="screen-title">Venues</div>
  </div>
  <div class="date-badge">May 22–25, 2026</div>
</header>

<div class="map-wrap">
  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <span class="cat-dot" style="background:#8B6914"></span>
      <span class="legend-label">Afterparty</span>
    </div>
    <div class="legend-item">
      <span class="cat-dot" style="background:#D4A843"></span>
      <span class="legend-label">Day party</span>
    </div>
    <div class="legend-item">
      <span class="cat-dot" style="background:#E8651A"></span>
      <span class="legend-label">Sunrise</span>
    </div>
    <div class="legend-item">
      <span class="cat-dot" style="background:#2A7A6F"></span>
      <span class="legend-label">Festival</span>
    </div>
  </div>

  <div class="selecting-hint" id="selectingHint">
    Tap a second venue<br>to plot a route
  </div>

  <div class="map-svg-container">
    <svg class="map" viewBox="0 0 390 360" xmlns="http://www.w3.org/2000/svg" id="mapSvg">
      <defs>
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
          <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(245,240,232,0.04)" stroke-width="0.5"/>
        </pattern>
      </defs>

      <!-- Background -->
      <rect width="390" height="360" fill="#0A0A0A"/>
      <rect width="390" height="360" fill="url(#grid)"/>

      <!-- Detroit River (south edge) -->
      <path d="M 0 330 Q 100 310 195 320 Q 290 330 390 305 L 390 360 L 0 360 Z"
            fill="#0D1A20" stroke="rgba(42,122,111,0.2)" stroke-width="0.5"/>
      <text x="195" y="348" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="8" letter-spacing="0.18em"
            fill="rgba(245,240,232,0.2)" text-transform="uppercase">DETROIT RIVER</text>

      <!-- Major roads — thin, elegant -->
      <!-- Woodward Ave (diagonal feel, major N-S) -->
      <line x1="170" y1="0" x2="210" y2="360" stroke="rgba(245,240,232,0.07)" stroke-width="1.5"/>
      <!-- Michigan Ave (E-W) -->
      <line x1="0" y1="200" x2="390" y2="200" stroke="rgba(245,240,232,0.05)" stroke-width="1"/>
      <!-- Jefferson (near river) -->
      <line x1="0" y1="295" x2="390" y2="295" stroke="rgba(245,240,232,0.06)" stroke-width="1.5"/>
      <!-- Grand Blvd (upper) -->
      <line x1="0" y1="100" x2="390" y2="100" stroke="rgba(245,240,232,0.04)" stroke-width="1"/>
      <!-- E-W mid streets -->
      <line x1="0" y1="150" x2="390" y2="150" stroke="rgba(245,240,232,0.03)" stroke-width="0.5"/>
      <line x1="0" y1="250" x2="390" y2="250" stroke="rgba(245,240,232,0.03)" stroke-width="0.5"/>
      <!-- N-S cross streets -->
      <line x1="80" y1="0" x2="80" y2="360" stroke="rgba(245,240,232,0.04)" stroke-width="0.5"/>
      <line x1="130" y1="0" x2="130" y2="360" stroke="rgba(245,240,232,0.03)" stroke-width="0.5"/>
      <line x1="260" y1="0" x2="260" y2="360" stroke="rgba(245,240,232,0.04)" stroke-width="0.5"/>
      <line x1="310" y1="0" x2="310" y2="360" stroke="rgba(245,240,232,0.03)" stroke-width="0.5"/>
      <line x1="340" y1="0" x2="340" y2="360" stroke="rgba(245,240,232,0.03)" stroke-width="0.5"/>

      <!-- I-75 / Lodge freeway suggestion -->
      <path d="M 60 0 L 55 180 L 60 360" stroke="rgba(245,240,232,0.08)" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>

      <!-- Road labels -->
      <text x="188" y="10" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="7" letter-spacing="0.14em"
            fill="rgba(245,240,232,0.18)" transform="rotate(2,188,10)">WOODWARD</text>
      <text x="20" y="196" text-anchor="start"
            font-family="DM Sans, sans-serif" font-size="7" letter-spacing="0.12em"
            fill="rgba(245,240,232,0.15)">MICHIGAN AVE</text>
      <text x="20" y="292" text-anchor="start"
            font-family="DM Sans, sans-serif" font-size="7" letter-spacing="0.12em"
            fill="rgba(245,240,232,0.18)">E JEFFERSON</text>

      <!-- Route line (hidden by default) -->
      <line id="routeLine" x1="0" y1="0" x2="0" y2="0"
            stroke="#8B6914" stroke-width="1.5" stroke-dasharray="4,3" opacity="0"/>

      <!-- Venue pins -->
      <!-- Hart Plaza — Festival — near river, center -->
      <g class="venue-pin" data-id="hart" data-name="Hart Plaza" data-addr="1 Hart Plaza" data-count="4 events" data-cat="festival"
         data-x="210" data-y="280" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="210" cy="280" r="18" fill="rgba(42,122,111,0.12)" class="pin-ring"/>
        <circle cx="210" cy="280" r="6" fill="#2A7A6F" class="pin-dot"/>
        <circle cx="210" cy="280" r="6" fill="none" stroke="#2A7A6F" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- Marble Bar — Afterparty — Corktown/Midtown area -->
      <g class="venue-pin" data-id="marble" data-name="Marble Bar" data-addr="1501 Holden St" data-count="12 events" data-cat="afterparty"
         data-x="100" data-y="160" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="100" cy="160" r="16" fill="rgba(139,105,20,0.12)" class="pin-ring"/>
        <circle cx="100" cy="160" r="5" fill="#8B6914" class="pin-dot"/>
        <circle cx="100" cy="160" r="5" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- TV Lounge — Sunrise — Rivertown -->
      <g class="venue-pin" data-id="tv" data-name="TV Lounge" data-addr="1 Atwater St" data-count="4 events" data-cat="sunrise"
         data-x="295" data-y="268" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="295" cy="268" r="14" fill="rgba(232,101,26,0.1)" class="pin-ring"/>
        <circle cx="295" cy="268" r="5" fill="#E8651A" class="pin-dot"/>
        <circle cx="295" cy="268" r="5" fill="none" stroke="#E8651A" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- Deluxx Fluxx — Day party — downtown -->
      <g class="venue-pin" data-id="deluxx" data-name="Deluxx Fluxx" data-addr="1274 Library St" data-count="5 events" data-cat="dayparty"
         data-x="225" data-y="230" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="225" cy="230" r="14" fill="rgba(212,168,67,0.1)" class="pin-ring"/>
        <circle cx="225" cy="230" r="5" fill="#D4A843" class="pin-dot"/>
        <circle cx="225" cy="230" r="5" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- El Club — Afterparty — SW Detroit -->
      <g class="venue-pin" data-id="elclub" data-name="El Club" data-addr="4114 Vernor Hwy" data-count="3 events" data-cat="afterparty"
         data-x="52" data-y="235" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="52" cy="235" r="14" fill="rgba(139,105,20,0.12)" class="pin-ring"/>
        <circle cx="52" cy="235" r="5" fill="#8B6914" class="pin-dot"/>
        <circle cx="52" cy="235" r="5" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- Tangent Gallery — Afterparty — Eastern Market -->
      <g class="venue-pin" data-id="tangent" data-name="Tangent Gallery" data-addr="715 E Milwaukee Ave" data-count="4 events" data-cat="afterparty"
         data-x="320" data-y="145" style="cursor:pointer" onclick="selectVenue(this)">
        <circle cx="320" cy="145" r="14" fill="rgba(139,105,20,0.12)" class="pin-ring"/>
        <circle cx="320" cy="145" r="5" fill="#8B6914" class="pin-dot"/>
        <circle cx="320" cy="145" r="5" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
      </g>

      <!-- Venue name labels -->
      <text x="100" y="148" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="8" letter-spacing="0.1em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">MARBLE BAR</text>

      <text x="210" y="268" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="8" letter-spacing="0.1em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">HART PLAZA</text>

      <text x="295" y="256" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="8" letter-spacing="0.1em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">TV LOUNGE</text>

      <text x="225" y="218" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="8" letter-spacing="0.1em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">DELUXX FLUXX</text>

      <text x="52" y="222" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="7.5" letter-spacing="0.08em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">EL CLUB</text>

      <text x="320" y="133" text-anchor="middle"
            font-family="DM Sans, sans-serif" font-size="7.5" letter-spacing="0.08em"
            fill="rgba(245,240,232,0.55)" pointer-events="none">TANGENT</text>
    </svg>

    <!-- FAB -->
    <button class="fab" title="Add location" onclick="alert('Add custom location')">
      <svg viewBox="0 0 16 16" fill="none" stroke="#F5F0E8" stroke-width="1.5">
        <line x1="8" y1="2" x2="8" y2="14"/>
        <line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
    </button>
  </div>
</div>

<!-- Route planner -->
<div class="route-panel">
  <div class="route-panel-header">
    <span class="route-label">Route Planner</span>
    <button class="route-clear" id="routeClear" onclick="clearRoute()">Clear</button>
  </div>
  <div class="route-venues">
    <div class="route-venue-slot" id="fromSlot">
      <span class="route-venue-slot-label">From</span>
      <span class="route-venue-slot-name empty" id="fromName">Select venue</span>
    </div>
    <div class="route-arrow">→</div>
    <div class="route-venue-slot" id="toSlot">
      <span class="route-venue-slot-label">To</span>
      <span class="route-venue-slot-name empty" id="toName">Select venue</span>
    </div>
  </div>
  <div class="route-stats" id="routeStats" style="display:none">
    <div class="route-stat">
      <span class="route-stat-val" id="statDist">—</span>
      <span class="route-stat-unit">Miles</span>
    </div>
    <div class="route-divider"></div>
    <div class="route-stat">
      <span class="route-stat-val" id="statWalk">—</span>
      <span class="route-stat-unit">Walk</span>
    </div>
    <div class="route-divider"></div>
    <div class="route-stat">
      <span class="route-stat-val" id="statDrive">—</span>
      <span class="route-stat-unit">Drive</span>
    </div>
  </div>
  <div class="route-stats" id="routePrompt" style="padding:12px 20px">
    <span style="font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;">
      Tap two venues on the map
    </span>
  </div>
</div>

<!-- Nav -->
<nav>
  <button class="nav-item active">
    <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M9 1L9 17M2 6l7-5 7 5M2 9v8h4v-5h6v5h4V9"/>
    </svg>
    <span class="nav-item-label">Map</span>
  </button>
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="2" y="3" width="14" height="12" rx="0"/>
      <line x1="2" y1="7" x2="16" y2="7"/>
      <line x1="6" y1="3" x2="6" y2="5"/>
      <line x1="12" y1="3" x2="12" y2="5"/>
    </svg>
    <span class="nav-item-label">Schedule</span>
  </button>
  <button class="nav-item">
    <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
      <circle cx="9" cy="6" r="3"/>
      <path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
    </svg>
    <span class="nav-item-label">Plan</span>
  </button>
</nav>

<script>
// Venue data with approximate coordinates and distance matrix
const venues = {
  hart:    { name: 'Hart Plaza', x: 210, y: 280 },
  marble:  { name: 'Marble Bar', x: 100, y: 160 },
  tv:      { name: 'TV Lounge', x: 295, y: 268 },
  deluxx:  { name: 'Deluxx Fluxx', x: 225, y: 230 },
  elclub:  { name: 'El Club', x: 52, y: 235 },
  tangent: { name: 'Tangent Gallery', x: 320, y: 145 },
};

// Approximate real-world distances (miles) between venue pairs
const distMatrix = {
  'hart-marble':  3.2, 'hart-tv': 1.1, 'hart-deluxx': 0.8, 'hart-elclub': 4.1, 'hart-tangent': 2.7,
  'marble-tv':    4.0, 'marble-deluxx': 3.1, 'marble-elclub': 2.8, 'marble-tangent': 5.2,
  'tv-deluxx':    1.4, 'tv-elclub': 5.0, 'tv-tangent': 1.8,
  'deluxx-elclub': 4.0, 'deluxx-tangent': 2.2,
  'elclub-tangent': 6.1,
};

function getDist(a, b) {
  const key1 = `${a}-${b}`;
  const key2 = `${b}-${a}`;
  return distMatrix[key1] || distMatrix[key2] || 1.5;
}

let selected = [];

function selectVenue(el) {
  const id = el.dataset.id;

  // Deselect if already selected
  if (selected.includes(id)) {
    selected = selected.filter(s => s !== id);
    el.querySelector('.pin-ring').style.opacity = '1';
    updatePanel();
    return;
  }

  if (selected.length >= 2) {
    // Reset previous
    selected.forEach(sid => {
      const prev = document.querySelector(`[data-id="${sid}"] .pin-ring`);
      if (prev) prev.style.opacity = '1';
    });
    selected = [];
  }

  selected.push(id);
  el.querySelector('.pin-ring').style.opacity = '1';
  el.querySelector('.pin-dot').style.opacity = '1';

  // Pulse effect
  const dot = el.querySelector('.pin-dot');
  dot.style.transform = 'scale(1.4)';
  dot.style.transition = 'transform 0.2s ease';
  setTimeout(() => { dot.style.transform = 'scale(1)'; }, 200);

  updatePanel();
}

function updatePanel() {
  const fromEl = document.getElementById('fromName');
  const toEl = document.getElementById('toName');
  const routeStats = document.getElementById('routeStats');
  const routePrompt = document.getElementById('routePrompt');
  const routeLine = document.getElementById('routeLine');
  const clearBtn = document.getElementById('routeClear');
  const hint = document.getElementById('selectingHint');

  if (selected.length === 0) {
    fromEl.textContent = 'Select venue';
    fromEl.classList.add('empty');
    toEl.textContent = 'Select venue';
    toEl.classList.add('empty');
    routeStats.style.display = 'none';
    routePrompt.style.display = 'flex';
    routeLine.setAttribute('opacity', '0');
    clearBtn.classList.remove('visible');
    hint.classList.remove('show');
  } else if (selected.length === 1) {
    const v = venues[selected[0]];
    fromEl.textContent = v.name;
    fromEl.classList.remove('empty');
    toEl.textContent = 'Select venue';
    toEl.classList.add('empty');
    routeStats.style.display = 'none';
    routePrompt.style.display = 'flex';
    routePrompt.querySelector('span').textContent = 'Now tap destination';
    routeLine.setAttribute('opacity', '0');
    clearBtn.classList.add('visible');
    hint.classList.add('show');
  } else {
    const va = venues[selected[0]];
    const vb = venues[selected[1]];
    fromEl.textContent = va.name;
    fromEl.classList.remove('empty');
    toEl.textContent = vb.name;
    toEl.classList.remove('empty');

    const dist = getDist(selected[0], selected[1]);
    const walkMins = Math.round(dist * 19); // ~19min/mile walking
    const driveMins = Math.round(dist * 3.5);

    document.getElementById('statDist').textContent = dist.toFixed(1);
    document.getElementById('statWalk').textContent = walkMins + 'm';
    document.getElementById('statDrive').textContent = driveMins + 'm';

    routeStats.style.display = 'grid';
    routePrompt.style.display = 'none';
    clearBtn.classList.add('visible');
    hint.classList.remove('show');

    // Draw route line
    routeLine.setAttribute('x1', va.x);
    routeLine.setAttribute('y1', va.y);
    routeLine.setAttribute('x2', vb.x);
    routeLine.setAttribute('y2', vb.y);
    routeLine.setAttribute('opacity', '1');
  }
}

function clearRoute() {
  selected.forEach(sid => {
    const el = document.querySelector(`[data-id="${sid}"] .pin-dot`);
    if (el) { el.style.transform = 'scale(1)'; }
  });
  selected = [];
  document.getElementById('routePrompt').querySelector('span').textContent = 'Tap two venues on the map';
  updatePanel();
}
</script>
</body>
</html>
